  // ---------- STATE ----------
  let currentFilter = 'all';
  let searchQuery = '';
  let sentences = [];
  let mySentences = [];
  let words = [];

  // TTS hızı
  let selectedRate = 1.0;

  // DOM
  const cardListEl = document.getElementById('cardList');
  const searchInput = document.getElementById('searchInput');
  const micButton = document.getElementById('micButton');
  const tabs = document.querySelectorAll('.tab');
  const addSentenceArea = document.getElementById('addSentenceArea');
  const addWordArea = document.getElementById('addWordArea');
  const newKrInput = document.getElementById('newKrInput');
  const newTrInput = document.getElementById('newTrInput');
  const addSentenceBtn = document.getElementById('addSentenceBtn');
  const newWordInput = document.getElementById('newWordInput');
  const newMeaningInput = document.getElementById('newMeaningInput');
  const addWordBtn = document.getElementById('addWordBtn');
  const rateSlider = document.getElementById('rateSlider');
  const rateDisplay = document.getElementById('rateDisplay');

  // ---------- LOCALSTORAGE (tüm veriler kalıcı) ----------
  function loadFromStorage() {
    const stored = localStorage.getItem('korean_sentences');
    if (stored) {
      try {
        sentences = JSON.parse(stored);
        sentences = sentences.map(s => ({ ...s, favorite: s.favorite || false }));
      } catch (e) {
        sentences = SENTENCES_RAW.map(s => ({ ...s }));
      }
    } else {
      sentences = SENTENCES_RAW.map(s => ({ ...s }));
    }

    const myStored = localStorage.getItem('korean_my_sentences');
    if (myStored) {
      try {
        mySentences = JSON.parse(myStored);
      } catch (e) {
        mySentences = [];
      }
    } else {
      mySentences = [];
    }

    const wordStored = localStorage.getItem('korean_words');
    if (wordStored) {
      try {
        words = JSON.parse(wordStored);
        words = words.map(w => ({ ...w, favorite: w.favorite || false }));
      } catch (e) {
        words = [];
      }
    } else {
      words = [];
    }

    const savedRate = localStorage.getItem('tts_rate');
    if (savedRate) {
      selectedRate = parseFloat(savedRate);
      rateSlider.value = selectedRate;
      rateDisplay.textContent = selectedRate.toFixed(1);
    }
  }

  function saveToStorage() {
    localStorage.setItem('korean_sentences', JSON.stringify(sentences));
    localStorage.setItem('korean_my_sentences', JSON.stringify(mySentences));
    localStorage.setItem('korean_words', JSON.stringify(words));
    localStorage.setItem('tts_rate', selectedRate.toString());
  }

  // ---------- FİLTRELEME ----------
  function getFilteredData() {
    if (currentFilter === 'words') {
      let filtered = [...words];
      if (searchQuery.trim() !== '') {
        const q = searchQuery.trim().toLowerCase();
        filtered = filtered.filter(w =>
          w.word.toLowerCase().includes(q) ||
          w.meaning.toLowerCase().includes(q)
        );
      }
      return filtered;
    }

    let filtered = [];
    if (currentFilter === 'all') filtered = [...sentences];
    else if (currentFilter === 'favorites') filtered = sentences.filter(s => s.favorite);
    else if (currentFilter === 'mine') filtered = [...mySentences];

    if (searchQuery.trim() !== '') {
      const q = searchQuery.trim().toLowerCase();
      filtered = filtered.filter(s =>
        s.kr.toLowerCase().includes(q) ||
        s.tr.toLowerCase().includes(q) ||
        (s.id && s.id.toLowerCase().includes(q))
      );
    }
    return filtered;
  }

  // ---------- RENDER ----------
  function renderCards() {
    const data = getFilteredData();

    if (data.length === 0) {
      cardListEl.innerHTML = `<div class="empty">🔍 Eşleşen öğe bulunamadı.</div>`;
      return;
    }

    let html = '';
    if (currentFilter === 'words') {
      data.forEach(w => {
        const starClass = w.favorite ? 'favorited' : '';
        html += `
          <div class="card" data-id="${w.id}">
            <div class="word-item" data-text="${w.word}" data-lang="ko">${w.word}</div>
            <div class="word-item" data-text="${w.meaning}" data-lang="tr" style="font-weight:400;color:#475569;">${w.meaning}</div>
            <div class="footer">
              <span class="code">✏️ kelime</span>
              <div>
                <button class="delete-btn" data-id="${w.id}" aria-label="Sil">🗑️</button>
                <button class="star ${starClass}" data-id="${w.id}" aria-label="Favori">★</button>
              </div>
            </div>
          </div>
        `;
      });
    } else {
      data.forEach(s => {
        const starClass = s.favorite ? 'favorited' : '';
        const isMySentence = currentFilter === 'mine';
        const krLines = s.kr.split('\n').filter(line => line.trim() !== '');
        const krHtml = krLines.map(line =>
          `<span class="kr-line" data-text="${line.replace(/"/g, '&quot;')}" data-lang="ko">${line}</span>`
        ).join('');
        const trLines = s.tr.split('\n').filter(line => line.trim() !== '');
        const trHtml = trLines.map(line =>
          `<span class="tr-line" data-text="${line.replace(/"/g, '&quot;')}" data-lang="tr">${line}</span>`
        ).join('');

        html += `
          <div class="card" data-id="${s.id || ''}" data-mine="${isMySentence}">
            <div class="kr">${krHtml}</div>
            <div class="tr">${trHtml}</div>
            <div class="footer">
              <span class="code">${s.id || '✏️'}</span>
              <div>
                ${isMySentence ? `<button class="delete-btn" data-id="${s.id || ''}" aria-label="Sil">🗑️</button>` : ''}
                <button class="star ${starClass}" data-id="${s.id || ''}" aria-label="Favori">★</button>
              </div>
            </div>
          </div>
        `;
      });
    }

    cardListEl.innerHTML = html;

    // Tıklama ile seslendirme (varsayılan sesler kullanılır)
    document.querySelectorAll('.kr-line, .tr-line, .word-item').forEach(el => {
      el.addEventListener('click', function(e) {
        e.stopPropagation();
        const text = this.dataset.text;
        const lang = this.dataset.lang;
        if (text) speakText(text, lang, this);
      });
    });

    document.querySelectorAll('.star').forEach(btn => {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        const id = this.dataset.id;
        toggleFavorite(id);
      });
    });

    document.querySelectorAll('.delete-btn').forEach(btn => {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        const id = this.dataset.id;
        deleteItem(id);
      });
    });
  }

  // ---------- TTS (varsayılan sesler, sadece hız ayarlı) ----------
  function speakText(text, lang, lineElement) {
    if (!window.speechSynthesis) {
      alert('Tarayıcınız TTS desteklemiyor.');
      return;
    }

    window.speechSynthesis.cancel();

    document.querySelectorAll('.speaking').forEach(el => el.classList.remove('speaking'));
    if (lineElement) lineElement.classList.add('speaking');

    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = (lang === 'ko') ? 'ko-KR' : 'tr-TR';
    utterance.rate = selectedRate;

    const removeSpeaking = () => {
      if (lineElement) lineElement.classList.remove('speaking');
    };
    utterance.onend = removeSpeaking;
    utterance.onerror = removeSpeaking;

    window.speechSynthesis.speak(utterance);
  }

  // ---------- FAVORİ / SİL / EKLE ----------
  function toggleFavorite(id) {
    let found = sentences.find(s => s.id === id);
    if (found) { found.favorite = !found.favorite; saveToStorage(); renderCards(); return; }
    found = mySentences.find(s => s.id === id);
    if (found) { found.favorite = !found.favorite; saveToStorage(); renderCards(); return; }
    found = words.find(w => w.id === id);
    if (found) { found.favorite = !found.favorite; saveToStorage(); renderCards(); return; }
  }

  function deleteItem(id) {
    let index = mySentences.findIndex(s => s.id === id);
    if (index !== -1) { mySentences.splice(index, 1); saveToStorage(); renderCards(); return; }
    index = words.findIndex(w => w.id === id);
    if (index !== -1) { words.splice(index, 1); saveToStorage(); renderCards(); return; }
  }

  function addMySentence(kr, tr) {
    if (!kr.trim() || !tr.trim()) {
      alert('Lütfen hem Korece hem Türkçe cümle girin.');
      return;
    }
    const newId = 'my-' + Date.now();
    mySentences.push({ id: newId, kr: kr.trim(), tr: tr.trim(), favorite: false });
    saveToStorage();
    renderCards();
    newKrInput.value = '';
    newTrInput.value = '';
  }

  function addWord(word, meaning) {
    if (!word.trim() || !meaning.trim()) {
      alert('Lütfen kelime ve anlamını girin.');
      return;
    }
    const newId = 'word-' + Date.now();
    words.push({ id: newId, word: word.trim(), meaning: meaning.trim(), favorite: false });
    saveToStorage();
    renderCards();
    newWordInput.value = '';
    newMeaningInput.value = '';
  }

  // ---------- SESLİ ARAMA (STT) ----------
  function startSpeechRecognition() {
    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
      alert('Tarayıcınız sesli arama (STT) desteklemiyor. Lütfen Chrome kullanın.');
      return;
    }
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.lang = 'tr-TR';
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;

    window.currentRecognition = recognition;
    micButton.classList.add('listening');
    micButton.textContent = '⏹';

    recognition.onresult = function(event) {
      const transcript = event.results[0][0].transcript;
      searchInput.value = transcript;
      searchQuery = transcript;
      renderCards();
      micButton.classList.remove('listening');
      micButton.textContent = '🎤';
      window.currentRecognition = null;
    };

    recognition.onerror = function(event) {
      console.warn('STT hatası:', event.error);
      micButton.classList.remove('listening');
      micButton.textContent = '🎤';
      window.currentRecognition = null;
      if (event.error === 'not-allowed') {
        alert('Mikrofon izni reddedildi.');
      }
    };

    recognition.onend = function() {
      micButton.classList.remove('listening');
      micButton.textContent = '🎤';
      window.currentRecognition = null;
    };

    recognition.start();
  }

  // ---------- OLAY BAĞLAMALARI ----------
  searchInput.addEventListener('input', function() {
    searchQuery = this.value;
    renderCards();
  });

  micButton.addEventListener('click', function() {
    if (this.classList.contains('listening')) {
      if (window.currentRecognition) {
        window.currentRecognition.abort();
      }
      this.classList.remove('listening');
      this.textContent = '🎤';
      window.currentRecognition = null;
    } else {
      startSpeechRecognition();
    }
  });

  tabs.forEach(tab => {
    tab.addEventListener('click', function() {
      tabs.forEach(t => t.classList.remove('active'));
      this.classList.add('active');
      currentFilter = this.dataset.filter;
      addSentenceArea.style.display = (currentFilter === 'mine') ? 'flex' : 'none';
      addWordArea.style.display = (currentFilter === 'words') ? 'flex' : 'none';
      renderCards();
    });
  });

  addSentenceBtn.addEventListener('click', () => addMySentence(newKrInput.value, newTrInput.value));
  newKrInput.addEventListener('keydown', e => { if (e.key === 'Enter') addSentenceBtn.click(); });
  newTrInput.addEventListener('keydown', e => { if (e.key === 'Enter') addSentenceBtn.click(); });

  addWordBtn.addEventListener('click', () => addWord(newWordInput.value, newMeaningInput.value));
  newWordInput.addEventListener('keydown', e => { if (e.key === 'Enter') addWordBtn.click(); });
  newMeaningInput.addEventListener('keydown', e => { if (e.key === 'Enter') addWordBtn.click(); });

  // Hız ayarı
  rateSlider.addEventListener('input', function() {
    selectedRate = parseFloat(this.value);
    rateDisplay.textContent = selectedRate.toFixed(1);
    localStorage.setItem('tts_rate', selectedRate.toString());
  });

  // ---------- BAŞLANGIÇ ----------
  loadFromStorage();
  renderCards();
  addSentenceArea.style.display = 'none';
  addWordArea.style.display = 'none';

  console.log('✅ Uygulama hazır. Cümle:', sentences.length + mySentences.length, 'Kelime:', words.length);
</script>
